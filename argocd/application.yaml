apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: about-me
  namespace: argocd
  labels:
    app.kubernetes.io/name: my-site
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/fortheXP/about-me.git
    targetRevision: main
    path: k8s                        

  destination:
    server: https://kubernetes.default.svc
    namespace: my-site

  syncPolicy:
    automated:
      prune: true    
      selfHeal: true 
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false       
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 3

  # ── Tell ArgoCD to ignore the secret and namespace ─────────────────
  # They live in the cluster but NOT in Git — without this ArgoCD
  # would either error or try to prune them.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: ghcr-secret
      namespace: my-site
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas    
